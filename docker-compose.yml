services:

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: tarjetas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: spring_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

volumes:
  postgres_data:
